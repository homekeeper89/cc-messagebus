<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>cc-messagebus</title>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #0e1116;
				--panel: #161b22;
				--border: #30363d;
				--text: #c9d1d9;
				--muted: #8b949e;
				--accent: #58a6ff;
				--ok: #3fb950;
				--warn: #d29922;
				--err: #f85149;
				--mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family: var(--mono);
				font-size: 13px;
			}
			body {
				display: grid;
				grid-template-rows: auto 1fr;
			}
			header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 10px 16px;
				border-bottom: 1px solid var(--border);
				background: var(--panel);
			}
			header h1 {
				font-size: 14px;
				margin: 0;
				font-weight: 600;
				letter-spacing: 0.02em;
			}
			.status {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				color: var(--muted);
			}
			.status .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--muted);
			}
			.status[data-state="connected"] .dot {
				background: var(--ok);
			}
			.status[data-state="reconnecting"] .dot {
				background: var(--warn);
			}
			.status[data-state="closed"] .dot {
				background: var(--err);
			}
			main {
				display: grid;
				grid-template-columns: 280px 1fr;
				min-height: 0;
			}
			aside {
				border-right: 1px solid var(--border);
				overflow-y: auto;
				padding: 12px;
				background: var(--panel);
			}
			aside h2 {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 0 0 8px;
				font-weight: 600;
			}
			.tree-row {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 8px;
				border-radius: 4px;
				cursor: pointer;
			}
			.tree-row:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			.tree-row[data-selected="1"] {
				background: rgba(88, 166, 255, 0.12);
			}
			.tree-row .tree-label {
				flex: 1;
				color: var(--text);
				font-weight: 600;
				letter-spacing: 0.04em;
			}
			.tree-section {
				margin-top: 14px;
			}
			.tree-list {
				list-style: none;
				margin: 0;
				padding: 0;
			}
			.tree-list li {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 8px 6px 16px;
				border-radius: 4px;
				cursor: pointer;
			}
			.tree-list li:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			.tree-list li[data-selected="1"] {
				background: rgba(88, 166, 255, 0.12);
			}
			.tree-list li .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--muted);
				flex-shrink: 0;
			}
			.tree-list li[data-status="connected"] .dot {
				background: var(--ok);
			}
			.tree-list li[data-status="disconnected"] .dot {
				background: var(--muted);
				opacity: 0.5;
			}
			.tree-list li .name {
				flex: 1;
				color: var(--text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.tree-list li[data-status="disconnected"] .name {
				color: var(--muted);
			}
			.tree-list li .meta {
				color: var(--muted);
				font-size: 11px;
				flex-shrink: 0;
			}
			.tree-list .empty {
				color: var(--muted);
				font-style: italic;
				padding: 4px 16px;
				cursor: default;
			}
			.tree-list .empty:hover {
				background: transparent;
			}
			section {
				overflow-y: auto;
				padding: 12px 16px;
			}
			section h2 {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 0 0 8px;
				font-weight: 600;
			}
			#flow {
				list-style: none;
				margin: 0;
				padding: 0;
			}
			#flow li {
				padding: 4px 6px;
				border-bottom: 1px solid var(--border);
				cursor: pointer;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			#flow li:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			#flow li .time {
				color: var(--muted);
				margin-right: 8px;
			}
			#flow li .kind {
				display: inline-block;
				min-width: 56px;
				color: var(--accent);
				margin-right: 8px;
			}
			#flow li[data-kind="message_read"] .kind {
				color: var(--warn);
			}
			#flow li[data-kind="message_acked"] .kind {
				color: var(--ok);
			}
			#flow li[data-kind="message_redelivered"] .kind,
			#flow li[data-kind="message_expired"] .kind {
				color: var(--err);
			}
			#flow li[data-kind="session_registered"] .kind,
			#flow li[data-kind="session_disconnected"] .kind {
				color: var(--muted);
			}
			#flow li[data-kind="channel_created"] .kind,
			#flow li[data-kind="channel_subscribed"] .kind,
			#flow li[data-kind="channel_unsubscribed"] .kind {
				color: var(--muted);
			}
			#flow li[data-kind="channel_message_published"] .kind {
				color: var(--accent);
			}
			#flow li pre {
				display: none;
				margin: 6px 0 0;
				padding: 8px;
				background: rgba(255, 255, 255, 0.04);
				border-radius: 4px;
				white-space: pre-wrap;
				word-break: break-all;
				color: var(--text);
				font-size: 12px;
			}
			#flow li[data-open="1"] pre {
				display: block;
			}
			#flow .empty {
				color: var(--muted);
				font-style: italic;
				padding: 4px;
				cursor: default;
			}
			#flow .empty:hover {
				background: transparent;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>cc-messagebus</h1>
			<span id="status" class="status" data-state="connecting"
				><span class="dot"></span><span id="status-text">connecting</span></span
			>
		</header>
		<main>
			<aside>
				<div class="tree-row" id="tree-all" data-selected="1">
					<span class="tree-label">ALL</span>
				</div>
				<div class="tree-section">
					<h2>Agents <span id="agents-count">(0)</span></h2>
					<ul id="agents" class="tree-list">
						<li class="empty">(no agents)</li>
					</ul>
				</div>
				<div class="tree-section">
					<h2>DMs</h2>
					<div class="tree-row" id="tree-dms">
						<span class="tree-label">DMs</span>
					</div>
				</div>
				<div class="tree-section">
					<h2>Channels <span id="channels-count">(0)</span></h2>
					<ul id="channels" class="tree-list">
						<li class="empty">(no channels)</li>
					</ul>
				</div>
			</aside>
			<section>
				<h2 id="flow-header">Message Flow · ALL</h2>
				<ol id="flow">
					<li class="empty">(no events yet)</li>
				</ol>
			</section>
		</main>
		<script type="module">
			const FLOW_CAP = 500;
			const FLOW_BUFFER_CAP = 500;

			const sessions = new Map();
			const channels = new Map();
			const flowBuffer = [];
			let selectedContext = { type: "all" };

			const agentsEl = document.getElementById("agents");
			const agentsCountEl = document.getElementById("agents-count");
			const channelsEl = document.getElementById("channels");
			const channelsCountEl = document.getElementById("channels-count");
			const treeAllEl = document.getElementById("tree-all");
			const treeDmsEl = document.getElementById("tree-dms");
			const flowEl = document.getElementById("flow");
			const flowHeaderEl = document.getElementById("flow-header");
			const statusEl = document.getElementById("status");
			const statusTextEl = document.getElementById("status-text");

			function setStatus(state, text) {
				statusEl.dataset.state = state;
				statusTextEl.textContent = text;
			}

			function timeLabel(iso) {
				const d = iso ? new Date(iso) : new Date();
				return d.toTimeString().slice(0, 8);
			}

			function relativeAgo(iso) {
				if (!iso) return "—";
				const diff = Date.now() - new Date(iso).getTime();
				const s = Math.max(0, Math.floor(diff / 1000));
				if (s < 60) return `${s}s`;
				const m = Math.floor(s / 60);
				if (m < 60) return `${m}m`;
				const h = Math.floor(m / 60);
				if (h < 24) return `${h}h`;
				return `${Math.floor(h / 24)}d`;
			}

			function compareDescNullsLast(a, b) {
				if (a === b) return 0;
				if (a == null) return 1;
				if (b == null) return -1;
				return a < b ? 1 : -1;
			}

			function sameContext(a, b) {
				if (a.type !== b.type) return false;
				if (a.type === "agent") return a.topicId === b.topicId;
				if (a.type === "channel") return a.channelId === b.channelId;
				return true;
			}

			function renderTreeSelection() {
				treeAllEl.dataset.selected = selectedContext.type === "all" ? "1" : "0";
				treeDmsEl.dataset.selected = selectedContext.type === "dm" ? "1" : "0";
			}

			function renderFlowHeader() {
				let label = "ALL";
				if (selectedContext.type === "agent") label = selectedContext.topicId;
				else if (selectedContext.type === "channel")
					label = `#${selectedContext.channelId}`;
				else if (selectedContext.type === "dm") label = "DMs";
				flowHeaderEl.textContent = `Message Flow · ${label}`;
			}

			function renderAgents() {
				agentsCountEl.textContent = `(${sessions.size})`;
				if (sessions.size === 0) {
					agentsEl.replaceChildren();
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent = "(no agents)";
					agentsEl.append(li);
					return;
				}
				const entries = [...sessions.values()].sort((a, b) =>
					compareDescNullsLast(a.lastActivityAt, b.lastActivityAt),
				);
				agentsEl.replaceChildren(
					...entries.map((p) => {
						const li = document.createElement("li");
						li.dataset.status = p.status ?? "connected";
						li.dataset.topicId = p.topicId;
						if (
							selectedContext.type === "agent" &&
							selectedContext.topicId === p.topicId
						) {
							li.dataset.selected = "1";
						}
						const dot = document.createElement("span");
						dot.className = "dot";
						const name = document.createElement("span");
						name.className = "name";
						name.textContent = p.topicId;
						const meta = document.createElement("span");
						meta.className = "meta";
						meta.textContent = relativeAgo(p.lastActivityAt);
						li.append(dot, name, meta);
						li.addEventListener("click", () =>
							onTreeRowClick({ type: "agent", topicId: p.topicId }),
						);
						return li;
					}),
				);
			}

			function renderChannels() {
				channelsCountEl.textContent = `(${channels.size})`;
				if (channels.size === 0) {
					channelsEl.replaceChildren();
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent = "(no channels)";
					channelsEl.append(li);
					return;
				}
				const entries = [...channels.values()].sort((a, b) =>
					compareDescNullsLast(a.lastPublishedAt, b.lastPublishedAt),
				);
				channelsEl.replaceChildren(
					...entries.map((c) => {
						const li = document.createElement("li");
						li.dataset.channelId = c.channelId;
						if (
							selectedContext.type === "channel" &&
							selectedContext.channelId === c.channelId
						) {
							li.dataset.selected = "1";
						}
						const name = document.createElement("span");
						name.className = "name";
						name.textContent = `#${c.channelId}`;
						const meta = document.createElement("span");
						meta.className = "meta";
						meta.textContent = relativeAgo(c.lastPublishedAt);
						li.append(name, meta);
						li.addEventListener("click", () =>
							onTreeRowClick({ type: "channel", channelId: c.channelId }),
						);
						return li;
					}),
				);
			}

			function describe(event) {
				switch (event.type) {
					case "message_sent":
						return `${event.message.from} → ${event.message.to}  ${event.message.subject}`;
					case "message_read":
					case "message_acked":
						return `${event.topicId}  ${event.messageId.slice(0, 8)}`;
					case "message_redelivered":
					case "message_expired":
						return event.messageId.slice(0, 8);
					case "session_registered":
						return event.peer.topicId;
					case "session_disconnected":
						return event.topicId;
					case "channel_created":
						return event.channel.channelId;
					case "channel_subscribed":
					case "channel_unsubscribed":
						return `${event.topicId}  ${event.channelId}`;
					case "channel_message_published":
						return `${event.from} → [${event.deliveredTo.join(", ")}]  ${event.channelId}`;
					default:
						return "";
				}
			}

			function pushFlow(event) {
				if (flowEl.firstElementChild?.classList?.contains("empty")) {
					flowEl.replaceChildren();
				}
				const li = document.createElement("li");
				li.dataset.kind = event.type;
				const at =
					event.at ??
					event.message?.sentAt ??
					event.sentAt ??
					event.channel?.createdAt ??
					new Date().toISOString();
				const time = document.createElement("span");
				time.className = "time";
				time.textContent = timeLabel(at);
				const kind = document.createElement("span");
				kind.className = "kind";
				kind.textContent = event.type
					.replace(/^message_/, "")
					.replace(/^session_/, "")
					.replace(/^channel_/, "");
				const desc = document.createTextNode(describe(event));
				li.append(time, kind, desc);
				const detail = document.createElement("pre");
				detail.textContent = JSON.stringify(event, null, 2);
				li.append(detail);
				li.addEventListener("click", () => {
					li.dataset.open = li.dataset.open === "1" ? "0" : "1";
				});
				flowEl.prepend(li);
				while (flowEl.children.length > FLOW_CAP) {
					flowEl.lastElementChild?.remove();
				}
			}

			function passesFilter(event) {
				const ctx = selectedContext;
				if (ctx.type === "all") return true;

				if (ctx.type === "agent") {
					const t = event.type;
					if (t === "message_sent")
						return (
							event.message.from === ctx.topicId ||
							event.message.to === ctx.topicId
						);
					if (t === "message_read" || t === "message_acked")
						return event.topicId === ctx.topicId;
					if (t === "session_registered")
						return event.peer.topicId === ctx.topicId;
					if (t === "session_disconnected") return event.topicId === ctx.topicId;
					if (t === "channel_subscribed" || t === "channel_unsubscribed")
						return event.topicId === ctx.topicId;
					if (t === "channel_message_published")
						return (
							event.from === ctx.topicId ||
							(event.deliveredTo ?? []).includes(ctx.topicId)
						);
					return false;
				}

				if (ctx.type === "channel") {
					const t = event.type;
					if (t === "channel_created")
						return event.channel.channelId === ctx.channelId;
					if (
						t === "channel_subscribed" ||
						t === "channel_unsubscribed" ||
						t === "channel_message_published"
					)
						return event.channelId === ctx.channelId;
					return false;
				}

				if (ctx.type === "dm") {
					// NOTE: channel fanout emits message_sent without channelId marker,
					// so DM filter passes all message_* events (PRD-decided "flat" DMs).
					return event.type.startsWith("message_");
				}

				return false;
			}

			function pushFlowMaybe(event) {
				flowBuffer.unshift(event);
				if (flowBuffer.length > FLOW_BUFFER_CAP)
					flowBuffer.length = FLOW_BUFFER_CAP;
				if (passesFilter(event)) pushFlow(event);
			}

			function rerenderFlowWithCurrentFilter() {
				flowEl.replaceChildren();
				const matched = flowBuffer.filter(passesFilter);
				if (matched.length === 0) {
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent =
						selectedContext.type === "all"
							? "(no events yet)"
							: "(no events match filter)";
					flowEl.append(li);
					return;
				}
				for (let i = matched.length - 1; i >= 0; i--) pushFlow(matched[i]);
			}

			function onTreeRowClick(ctx) {
				selectedContext = sameContext(selectedContext, ctx)
					? { type: "all" }
					: ctx;
				renderTreeSelection();
				renderAgents();
				renderChannels();
				renderFlowHeader();
				rerenderFlowWithCurrentFilter();
			}

			treeAllEl.addEventListener("click", () =>
				onTreeRowClick({ type: "all" }),
			);
			treeDmsEl.addEventListener("click", () => onTreeRowClick({ type: "dm" }));

			function applySnapshot(peers) {
				sessions.clear();
				for (const p of peers) sessions.set(p.topicId, p);
				renderAgents();
			}

			function applyRegistered(peer) {
				sessions.set(peer.topicId, { ...peer, status: "connected" });
				renderAgents();
			}

			function applyDisconnected(topicId) {
				const existing = sessions.get(topicId);
				if (existing) {
					sessions.set(topicId, { ...existing, status: "disconnected" });
					renderAgents();
				}
			}

			function applyQueueDelta(topicId, delta) {
				const existing = sessions.get(topicId);
				if (!existing) return;
				const next = Math.max(0, (existing.queueLength ?? 0) + delta);
				sessions.set(topicId, { ...existing, queueLength: next });
				renderAgents();
			}

			function applyLastActivity(topicId, at) {
				const existing = sessions.get(topicId);
				if (!existing) return;
				sessions.set(topicId, { ...existing, lastActivityAt: at });
				renderAgents();
			}

			function applyChannelCreated(channel) {
				channels.set(channel.channelId, {
					...channel,
					subscriberCount: 0,
					lastPublishedAt: null,
				});
				renderChannels();
			}

			function applyChannelSubscribed(channelId) {
				const ch = channels.get(channelId);
				if (!ch) return;
				channels.set(channelId, {
					...ch,
					subscriberCount: (ch.subscriberCount ?? 0) + 1,
				});
				renderChannels();
			}

			function applyChannelUnsubscribed(channelId) {
				const ch = channels.get(channelId);
				if (!ch) return;
				channels.set(channelId, {
					...ch,
					subscriberCount: Math.max(0, (ch.subscriberCount ?? 0) - 1),
				});
				renderChannels();
			}

			function applyChannelPublished(channelId, sentAt) {
				const ch = channels.get(channelId);
				if (!ch) return;
				channels.set(channelId, { ...ch, lastPublishedAt: sentAt });
				renderChannels();
			}

			async function loadInitialChannels() {
				try {
					const res = await fetch("/api/list_channels", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: "{}",
					});
					const json = await res.json();
					if (!json?.success) return;
					for (const ch of json.data?.channels ?? []) {
						channels.set(ch.channelId, ch);
					}
					renderChannels();
				} catch {
					// 무시: SSE channel_created로 점진 복구
				}
			}

			function connect() {
				const es = new EventSource("/events");
				setStatus("connecting", "connecting");
				es.onopen = () => setStatus("connected", "connected");
				es.onerror = () => setStatus("reconnecting", "reconnecting");

				es.addEventListener("session_snapshot", (e) => {
					const data = JSON.parse(e.data);
					applySnapshot(data.peers);
				});
				es.addEventListener("session_registered", (e) => {
					const data = JSON.parse(e.data);
					applyRegistered(data.peer);
					pushFlowMaybe(data);
				});
				es.addEventListener("session_disconnected", (e) => {
					const data = JSON.parse(e.data);
					applyDisconnected(data.topicId);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_sent", (e) => {
					const data = JSON.parse(e.data);
					applyQueueDelta(data.message.to, 1);
					applyLastActivity(data.message.from, data.message.sentAt);
					applyLastActivity(data.message.to, data.message.sentAt);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_read", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("message_acked", (e) => {
					const data = JSON.parse(e.data);
					applyQueueDelta(data.topicId, -1);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_redelivered", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("message_expired", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("channel_created", (e) => {
					const data = JSON.parse(e.data);
					applyChannelCreated(data.channel);
					pushFlowMaybe(data);
				});
				es.addEventListener("channel_subscribed", (e) => {
					const data = JSON.parse(e.data);
					applyChannelSubscribed(data.channelId);
					pushFlowMaybe(data);
				});
				es.addEventListener("channel_unsubscribed", (e) => {
					const data = JSON.parse(e.data);
					applyChannelUnsubscribed(data.channelId);
					pushFlowMaybe(data);
				});
				es.addEventListener("channel_message_published", (e) => {
					const data = JSON.parse(e.data);
					applyChannelPublished(data.channelId, data.sentAt);
					pushFlowMaybe(data);
				});
				es.addEventListener("heartbeat", () => {});
			}

			renderFlowHeader();
			loadInitialChannels();
			connect();
		</script>
	</body>
</html>
