<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>cc-messagebus</title>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #0e1116;
				--panel: #161b22;
				--border: #30363d;
				--text: #c9d1d9;
				--muted: #8b949e;
				--accent: #58a6ff;
				--ok: #3fb950;
				--warn: #d29922;
				--err: #f85149;
				--mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family: var(--mono);
				font-size: 13px;
			}
			body {
				display: grid;
				grid-template-rows: auto 1fr;
			}
			header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 10px 16px;
				border-bottom: 1px solid var(--border);
				background: var(--panel);
			}
			header h1 {
				font-size: 14px;
				margin: 0;
				font-weight: 600;
				letter-spacing: 0.02em;
			}
			.status {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				color: var(--muted);
			}
			.status .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--muted);
			}
			.status[data-state="connected"] .dot {
				background: var(--ok);
			}
			.status[data-state="reconnecting"] .dot {
				background: var(--warn);
			}
			.status[data-state="closed"] .dot {
				background: var(--err);
			}
			main {
				display: grid;
				grid-template-columns: 280px 1fr;
				min-height: 0;
			}
			aside {
				border-right: 1px solid var(--border);
				overflow-y: auto;
				padding: 12px;
				background: var(--panel);
			}
			aside h2 {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 0 0 8px;
				font-weight: 600;
			}
			.tree-row {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 8px;
				border-radius: 4px;
				cursor: pointer;
			}
			.tree-row:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			.tree-row[data-selected="1"] {
				background: rgba(88, 166, 255, 0.12);
			}
			.tree-row .tree-label {
				flex: 1;
				color: var(--text);
				font-weight: 600;
				letter-spacing: 0.04em;
			}
			.tree-section {
				margin-top: 14px;
			}
			.tree-list {
				list-style: none;
				margin: 0;
				padding: 0;
			}
			.tree-list li {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 8px 6px 16px;
				border-radius: 4px;
				cursor: pointer;
			}
			.tree-list li:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			.tree-list li[data-selected="1"] {
				background: rgba(88, 166, 255, 0.12);
			}
			.tree-list li .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--muted);
				flex-shrink: 0;
			}
			.tree-list li[data-status="connected"] .dot {
				background: var(--ok);
			}
			.tree-list li[data-status="disconnected"] .dot {
				background: var(--muted);
				opacity: 0.5;
			}
			.tree-list li .name {
				flex: 1;
				color: var(--text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.tree-list li[data-status="disconnected"] .name {
				color: var(--muted);
			}
			.tree-list li .meta {
				color: var(--muted);
				font-size: 11px;
				flex-shrink: 0;
			}
			.tree-list .empty {
				color: var(--muted);
				font-style: italic;
				padding: 4px 16px;
				cursor: default;
			}
			.tree-list .empty:hover {
				background: transparent;
			}
			section {
				overflow-y: auto;
				padding: 12px 16px;
			}
			section h2 {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 0 0 8px;
				font-weight: 600;
			}
			#flow {
				list-style: none;
				margin: 0;
				padding: 0;
			}
			#flow li {
				padding: 4px 6px;
				border-bottom: 1px solid var(--border);
				cursor: pointer;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			#flow li:hover {
				background: rgba(88, 166, 255, 0.06);
			}
			#flow li .time {
				color: var(--muted);
				margin-right: 8px;
			}
			#flow li .kind {
				display: inline-block;
				min-width: 56px;
				color: var(--accent);
				margin-right: 8px;
			}
			#flow li[data-kind="message_read"] .kind {
				color: var(--warn);
			}
			#flow li[data-kind="message_acked"] .kind {
				color: var(--ok);
			}
			#flow li[data-kind="message_redelivered"] .kind,
			#flow li[data-kind="message_expired"] .kind {
				color: var(--err);
			}
			#flow li[data-kind="session_registered"] .kind,
			#flow li[data-kind="session_disconnected"] .kind {
				color: var(--muted);
			}
			#flow li[data-kind="topic_created"] .kind,
			#flow li[data-kind="topic_subscribed"] .kind,
			#flow li[data-kind="topic_unsubscribed"] .kind {
				color: var(--muted);
			}
			#flow li[data-kind="topic_message_published"] .kind {
				color: var(--accent);
			}
			#flow li pre {
				display: none;
				margin: 6px 0 0;
				padding: 8px;
				background: rgba(255, 255, 255, 0.04);
				border-radius: 4px;
				white-space: pre-wrap;
				word-break: break-all;
				color: var(--text);
				font-size: 12px;
			}
			#flow li[data-open="1"] pre {
				display: block;
			}
			#flow .empty {
				color: var(--muted);
				font-style: italic;
				padding: 4px;
				cursor: default;
			}
			#flow .empty:hover {
				background: transparent;
			}
			#detail h2 {
				font-size: 14px;
				text-transform: none;
				letter-spacing: 0.02em;
				color: var(--text);
				margin: 0;
				font-weight: 600;
			}
			#detail .muted-line {
				color: var(--muted);
				margin: 4px 0 12px;
				font-size: 12px;
			}
			#detail .section-h {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 16px 0 8px;
				font-weight: 600;
			}
			#detail .card-list {
				list-style: none;
				margin: 0;
				padding: 0;
			}
			#detail .card-list li {
				display: grid;
				grid-template-columns: 1fr auto auto auto;
				gap: 12px;
				align-items: baseline;
				padding: 8px 10px;
				border: 1px solid var(--border);
				border-radius: 4px;
				margin-bottom: 6px;
				background: rgba(255, 255, 255, 0.02);
			}
			#detail .card-list li.empty {
				display: block;
				border: none;
				background: transparent;
				color: var(--muted);
				font-style: italic;
				padding: 4px;
			}
			#detail .card-list li .peer {
				color: var(--text);
				font-weight: 600;
			}
			#detail .card-list li .stat {
				color: var(--muted);
				font-size: 12px;
			}
			#detail .card-list li[data-kind="history"] {
				grid-template-columns: auto auto 1fr;
			}
			#detail .card-list li[data-kind="history"] .time {
				color: var(--muted);
			}
			#detail .card-list li[data-kind="history"] .from {
				color: var(--accent);
			}
			#detail .card-list li[data-kind="history"] .subject {
				color: var(--text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>cc-messagebus</h1>
			<span id="status" class="status" data-state="connecting"
				><span class="dot"></span><span id="status-text">connecting</span></span
			>
		</header>
		<main>
			<aside>
				<div class="tree-row" id="tree-all" data-selected="1">
					<span class="tree-label">ALL</span>
				</div>
				<div class="tree-section">
					<h2>Peers <span id="peers-count">(0)</span></h2>
					<ul id="peers" class="tree-list">
						<li class="empty">(no peers)</li>
					</ul>
				</div>
				<div class="tree-section">
					<h2>DMs</h2>
					<div class="tree-row" id="tree-dms">
						<span class="tree-label">DMs</span>
					</div>
				</div>
				<div class="tree-section">
					<h2>Topics <span id="topics-count">(0)</span></h2>
					<ul id="topics" class="tree-list">
						<li class="empty">(no topics)</li>
					</ul>
				</div>
			</aside>
			<section>
				<h2 id="flow-header">Message Flow · ALL</h2>
				<ol id="flow">
					<li class="empty">(no events yet)</li>
				</ol>
				<div id="detail" hidden>
					<h2 id="detail-title">#</h2>
					<p id="detail-meta" class="muted-line"></p>
					<h3 class="section-h">
						Subscribers <span id="detail-subscribers-count">(0)</span>
					</h3>
					<ul id="detail-subscribers" class="card-list">
						<li class="empty">(no subscribers)</li>
					</ul>
					<h3 class="section-h">
						History <span id="detail-history-meta">(0)</span>
					</h3>
					<ol id="detail-history" class="card-list">
						<li class="empty">(no messages)</li>
					</ol>
				</div>
			</section>
		</main>
		<script type="module">
			const FLOW_CAP = 500;
			const FLOW_BUFFER_CAP = 500;
			const HISTORY_LIMIT = 50;
			const HISTORY_REFRESH_DEBOUNCE_MS = 250;

			const sessions = new Map();
			const topics = new Map();
			const flowBuffer = [];
			let selectedContext = { type: "all" };
			let topicDetail = null;
			let topicHistory = [];
			let historyRefreshTimer = null;

			const peersEl = document.getElementById("peers");
			const peersCountEl = document.getElementById("peers-count");
			const topicsEl = document.getElementById("topics");
			const topicsCountEl = document.getElementById("topics-count");
			const treeAllEl = document.getElementById("tree-all");
			const treeDmsEl = document.getElementById("tree-dms");
			const flowEl = document.getElementById("flow");
			const flowHeaderEl = document.getElementById("flow-header");
			const statusEl = document.getElementById("status");
			const statusTextEl = document.getElementById("status-text");
			const detailRoot = document.getElementById("detail");
			const detailTitleEl = document.getElementById("detail-title");
			const detailMetaEl = document.getElementById("detail-meta");
			const detailSubsEl = document.getElementById("detail-subscribers");
			const detailSubsCountEl = document.getElementById(
				"detail-subscribers-count",
			);
			const detailHistEl = document.getElementById("detail-history");
			const detailHistMetaEl = document.getElementById("detail-history-meta");

			function setStatus(state, text) {
				statusEl.dataset.state = state;
				statusTextEl.textContent = text;
			}

			function timeLabel(iso) {
				const d = iso ? new Date(iso) : new Date();
				return d.toTimeString().slice(0, 8);
			}

			function relativeAgo(iso) {
				if (!iso) return "—";
				const diff = Date.now() - new Date(iso).getTime();
				const s = Math.max(0, Math.floor(diff / 1000));
				if (s < 60) return `${s}s`;
				const m = Math.floor(s / 60);
				if (m < 60) return `${m}m`;
				const h = Math.floor(m / 60);
				if (h < 24) return `${h}h`;
				return `${Math.floor(h / 24)}d`;
			}

			function compareDescNullsLast(a, b) {
				if (a === b) return 0;
				if (a == null) return 1;
				if (b == null) return -1;
				return a < b ? 1 : -1;
			}

			function sameContext(a, b) {
				if (a.type !== b.type) return false;
				if (a.type === "agent") return a.peerId === b.peerId;
				if (a.type === "topic") return a.topicId === b.topicId;
				return true;
			}

			function renderTreeSelection() {
				treeAllEl.dataset.selected = selectedContext.type === "all" ? "1" : "0";
				treeDmsEl.dataset.selected = selectedContext.type === "dm" ? "1" : "0";
			}

			function renderFlowHeader() {
				let label = "ALL";
				if (selectedContext.type === "agent") label = selectedContext.peerId;
				else if (selectedContext.type === "topic")
					label = `#${selectedContext.topicId}`;
				else if (selectedContext.type === "dm") label = "DMs";
				flowHeaderEl.textContent = `Message Flow · ${label}`;
			}

			function renderPeers() {
				peersCountEl.textContent = `(${sessions.size})`;
				if (sessions.size === 0) {
					peersEl.replaceChildren();
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent = "(no peers)";
					peersEl.append(li);
					return;
				}
				const entries = [...sessions.values()].sort((a, b) =>
					compareDescNullsLast(a.lastActivityAt, b.lastActivityAt),
				);
				peersEl.replaceChildren(
					...entries.map((p) => {
						const li = document.createElement("li");
						li.dataset.status = p.status ?? "connected";
						li.dataset.peerId = p.peerId;
						if (
							selectedContext.type === "agent" &&
							selectedContext.peerId === p.peerId
						) {
							li.dataset.selected = "1";
						}
						const dot = document.createElement("span");
						dot.className = "dot";
						const name = document.createElement("span");
						name.className = "name";
						name.textContent = p.peerId;
						const meta = document.createElement("span");
						meta.className = "meta";
						meta.textContent = relativeAgo(p.lastActivityAt);
						li.append(dot, name, meta);
						li.addEventListener("click", () =>
							onTreeRowClick({ type: "agent", peerId: p.peerId }),
						);
						return li;
					}),
				);
			}

			function renderTopics() {
				topicsCountEl.textContent = `(${topics.size})`;
				if (topics.size === 0) {
					topicsEl.replaceChildren();
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent = "(no topics)";
					topicsEl.append(li);
					return;
				}
				const entries = [...topics.values()].sort((a, b) =>
					compareDescNullsLast(a.lastPublishedAt, b.lastPublishedAt),
				);
				topicsEl.replaceChildren(
					...entries.map((c) => {
						const li = document.createElement("li");
						li.dataset.topicId = c.topicId;
						if (
							selectedContext.type === "topic" &&
							selectedContext.topicId === c.topicId
						) {
							li.dataset.selected = "1";
						}
						const name = document.createElement("span");
						name.className = "name";
						name.textContent = `#${c.topicId}`;
						const meta = document.createElement("span");
						meta.className = "meta";
						meta.textContent = relativeAgo(c.lastPublishedAt);
						li.append(name, meta);
						li.addEventListener("click", () =>
							onTreeRowClick({ type: "topic", topicId: c.topicId }),
						);
						return li;
					}),
				);
			}

			function describe(event) {
				switch (event.type) {
					case "message_sent":
						return `${event.message.from} → ${event.message.to}  ${event.message.subject}`;
					case "message_read":
					case "message_acked":
						return `${event.peerId}  ${event.messageId.slice(0, 8)}`;
					case "message_redelivered":
					case "message_expired":
						return event.messageId.slice(0, 8);
					case "session_registered":
						return event.peer.peerId;
					case "session_disconnected":
						return event.peerId;
					case "topic_created":
						return event.topic.topicId;
					case "topic_subscribed":
					case "topic_unsubscribed":
						return `${event.peerId}  ${event.topicId}`;
					case "topic_message_published":
						return `${event.from} → [${event.deliveredTo.join(", ")}]  ${event.topicId}`;
					default:
						return "";
				}
			}

			function pushFlow(event) {
				if (flowEl.firstElementChild?.classList?.contains("empty")) {
					flowEl.replaceChildren();
				}
				const li = document.createElement("li");
				li.dataset.kind = event.type;
				const at =
					event.at ??
					event.message?.sentAt ??
					event.sentAt ??
					event.topic?.createdAt ??
					new Date().toISOString();
				const time = document.createElement("span");
				time.className = "time";
				time.textContent = timeLabel(at);
				const kind = document.createElement("span");
				kind.className = "kind";
				kind.textContent = event.type
					.replace(/^message_/, "")
					.replace(/^session_/, "")
					.replace(/^topic_/, "");
				const desc = document.createTextNode(describe(event));
				li.append(time, kind, desc);
				const detail = document.createElement("pre");
				detail.textContent = JSON.stringify(event, null, 2);
				li.append(detail);
				li.addEventListener("click", () => {
					li.dataset.open = li.dataset.open === "1" ? "0" : "1";
				});
				flowEl.prepend(li);
				while (flowEl.children.length > FLOW_CAP) {
					flowEl.lastElementChild?.remove();
				}
			}

			function passesFilter(event) {
				const ctx = selectedContext;
				if (ctx.type === "all") return true;

				if (ctx.type === "agent") {
					const t = event.type;
					if (t === "message_sent")
						return (
							event.message.from === ctx.peerId ||
							event.message.to === ctx.peerId
						);
					if (t === "message_read" || t === "message_acked")
						return event.peerId === ctx.peerId;
					if (t === "session_registered")
						return event.peer.peerId === ctx.peerId;
					if (t === "session_disconnected") return event.peerId === ctx.peerId;
					if (t === "topic_subscribed" || t === "topic_unsubscribed")
						return event.peerId === ctx.peerId;
					if (t === "topic_message_published")
						return (
							event.from === ctx.peerId ||
							(event.deliveredTo ?? []).includes(ctx.peerId)
						);
					return false;
				}

				if (ctx.type === "topic") {
					const t = event.type;
					if (t === "topic_created")
						return event.topic.topicId === ctx.topicId;
					if (
						t === "topic_subscribed" ||
						t === "topic_unsubscribed" ||
						t === "topic_message_published"
					)
						return event.topicId === ctx.topicId;
					return false;
				}

				if (ctx.type === "dm") {
					// NOTE: topic fanout emits message_sent without topicId marker,
					// so DM filter passes all message_* events (PRD-decided "flat" DMs).
					return event.type.startsWith("message_");
				}

				return false;
			}

			function pushFlowMaybe(event) {
				flowBuffer.unshift(event);
				if (flowBuffer.length > FLOW_BUFFER_CAP)
					flowBuffer.length = FLOW_BUFFER_CAP;
				if (passesFilter(event)) pushFlow(event);
			}

			function rerenderFlowWithCurrentFilter() {
				flowEl.replaceChildren();
				const matched = flowBuffer.filter(passesFilter);
				if (matched.length === 0) {
					const li = document.createElement("li");
					li.className = "empty";
					li.textContent =
						selectedContext.type === "all"
							? "(no events yet)"
							: "(no events match filter)";
					flowEl.append(li);
					return;
				}
				for (let i = matched.length - 1; i >= 0; i--) pushFlow(matched[i]);
			}

			function isDetailMode() {
				return selectedContext.type === "topic";
			}

			function makeEmpty(text) {
				const li = document.createElement("li");
				li.className = "empty";
				li.textContent = text;
				return li;
			}

			function enterTopicDetail(topicId) {
				flowHeaderEl.hidden = true;
				flowEl.hidden = true;
				detailRoot.hidden = false;
				detailTitleEl.textContent = `#${topicId}`;
				detailMetaEl.textContent = "loading…";
				detailSubsCountEl.textContent = "(0)";
				detailHistMetaEl.textContent = "(0)";
				detailSubsEl.replaceChildren(makeEmpty("loading…"));
				detailHistEl.replaceChildren(makeEmpty("loading…"));
			}

			function exitTopicDetail() {
				flowHeaderEl.hidden = false;
				flowEl.hidden = false;
				detailRoot.hidden = true;
				topicDetail = null;
				topicHistory = [];
				if (historyRefreshTimer) {
					clearTimeout(historyRefreshTimer);
					historyRefreshTimer = null;
				}
			}

			function renderDetailHeader() {
				if (!topicDetail) return;
				detailTitleEl.textContent = `#${topicDetail.topicId}`;
				const subCount = topicDetail.subscribers.length;
				const created = new Date(topicDetail.createdAt).toLocaleString();
				const noun = subCount === 1 ? "subscriber" : "subscribers";
				detailMetaEl.textContent = `created by ${topicDetail.createdBy} · ${created} · ${subCount} ${noun}`;
			}

			function renderDetailSubscribers() {
				if (!topicDetail) return;
				const subs = topicDetail.subscribers;
				detailSubsCountEl.textContent = `(${subs.length})`;
				if (subs.length === 0) {
					detailSubsEl.replaceChildren(makeEmpty("(no subscribers)"));
					return;
				}
				detailSubsEl.replaceChildren(
					...subs.map((s) => {
						const li = document.createElement("li");
						const peer = document.createElement("span");
						peer.className = "peer";
						peer.textContent = s.peerId;
						const q = document.createElement("span");
						q.className = "stat";
						q.textContent = `queue ${s.queueDepth}`;
						const lr = document.createElement("span");
						lr.className = "stat";
						lr.textContent = s.lastReadAt
							? `last read ${relativeAgo(s.lastReadAt)} ago`
							: "never read";
						const sub = document.createElement("span");
						sub.className = "stat";
						sub.textContent = `subscribed ${relativeAgo(s.subscribedAt)} ago`;
						li.append(peer, q, lr, sub);
						return li;
					}),
				);
			}

			function renderDetailHistory() {
				const msgs = topicHistory;
				detailHistMetaEl.textContent = `(${msgs.length})`;
				if (msgs.length === 0) {
					detailHistEl.replaceChildren(makeEmpty("(no messages)"));
					return;
				}
				detailHistEl.replaceChildren(
					...msgs.map((m) => {
						const li = document.createElement("li");
						li.dataset.kind = "history";
						const time = document.createElement("span");
						time.className = "time";
						time.textContent = timeLabel(m.sentAt);
						const from = document.createElement("span");
						from.className = "from";
						from.textContent = m.from;
						const subj = document.createElement("span");
						subj.className = "subject";
						subj.textContent = m.subject;
						li.append(time, from, subj);
						return li;
					}),
				);
			}

			async function loadTopicDetail(topicId) {
				try {
					const res = await fetch("/api/topic_detail", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ topicId }),
					});
					const json = await res.json();
					if (!json?.success) return;
					if (!isDetailMode() || selectedContext.topicId !== topicId) return;
					topicDetail = json.data?.topic ?? null;
					renderDetailHeader();
					renderDetailSubscribers();
				} catch {
					// 무시: placeholder 잔존, SSE 보강 가능
				}
			}

			async function loadTopicHistory(topicId) {
				try {
					const res = await fetch("/api/topic_history", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ topicId, limit: HISTORY_LIMIT }),
					});
					const json = await res.json();
					if (!json?.success) return;
					if (!isDetailMode() || selectedContext.topicId !== topicId) return;
					topicHistory = json.data?.messages ?? [];
					renderDetailHistory();
				} catch {
					// 무시
				}
			}

			function scheduleHistoryRefresh() {
				if (historyRefreshTimer) clearTimeout(historyRefreshTimer);
				const topicId = selectedContext.topicId;
				historyRefreshTimer = setTimeout(() => {
					historyRefreshTimer = null;
					if (isDetailMode() && selectedContext.topicId === topicId) {
						loadTopicHistory(topicId);
					}
				}, HISTORY_REFRESH_DEBOUNCE_MS);
			}

			function onTreeRowClick(ctx) {
				const next = sameContext(selectedContext, ctx) ? { type: "all" } : ctx;
				const wasDetail = isDetailMode();
				const willBeDetail = next.type === "topic";
				selectedContext = next;
				renderTreeSelection();
				renderPeers();
				renderTopics();
				if (willBeDetail) {
					enterTopicDetail(next.topicId);
					loadTopicDetail(next.topicId);
					loadTopicHistory(next.topicId);
				} else {
					if (wasDetail) exitTopicDetail();
					renderFlowHeader();
					rerenderFlowWithCurrentFilter();
				}
			}

			treeAllEl.addEventListener("click", () =>
				onTreeRowClick({ type: "all" }),
			);
			treeDmsEl.addEventListener("click", () => onTreeRowClick({ type: "dm" }));

			function applySnapshot(peers) {
				sessions.clear();
				for (const p of peers) sessions.set(p.peerId, p);
				renderPeers();
			}

			function applyRegistered(peer) {
				sessions.set(peer.peerId, { ...peer, status: "connected" });
				renderPeers();
			}

			function applyDisconnected(peerId) {
				const existing = sessions.get(peerId);
				if (existing) {
					sessions.set(peerId, { ...existing, status: "disconnected" });
					renderPeers();
				}
			}

			function applyQueueDelta(peerId, delta) {
				const existing = sessions.get(peerId);
				if (!existing) return;
				const next = Math.max(0, (existing.queueLength ?? 0) + delta);
				sessions.set(peerId, { ...existing, queueLength: next });
				renderPeers();
			}

			function applyLastActivity(peerId, at) {
				const existing = sessions.get(peerId);
				if (!existing) return;
				sessions.set(peerId, { ...existing, lastActivityAt: at });
				renderPeers();
			}

			function applyTopicCreated(topic) {
				topics.set(topic.topicId, {
					...topic,
					subscriberCount: 0,
					lastPublishedAt: null,
				});
				renderTopics();
			}

			function applyTopicSubscribed(topicId) {
				const t = topics.get(topicId);
				if (!t) return;
				topics.set(topicId, {
					...t,
					subscriberCount: (t.subscriberCount ?? 0) + 1,
				});
				renderTopics();
			}

			function applyTopicUnsubscribed(topicId) {
				const t = topics.get(topicId);
				if (!t) return;
				topics.set(topicId, {
					...t,
					subscriberCount: Math.max(0, (t.subscriberCount ?? 0) - 1),
				});
				renderTopics();
			}

			function applyTopicPublished(topicId, sentAt) {
				const t = topics.get(topicId);
				if (!t) return;
				topics.set(topicId, { ...t, lastPublishedAt: sentAt });
				renderTopics();
			}

			async function loadInitialTopics() {
				try {
					const res = await fetch("/api/list_topics", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: "{}",
					});
					const json = await res.json();
					if (!json?.success) return;
					for (const t of json.data?.topics ?? []) {
						topics.set(t.topicId, t);
					}
					renderTopics();
				} catch {
					// 무시: SSE topic_created로 점진 복구
				}
			}

			function connect() {
				const es = new EventSource("/events");
				setStatus("connecting", "connecting");
				es.onopen = () => setStatus("connected", "connected");
				es.onerror = () => setStatus("reconnecting", "reconnecting");

				es.addEventListener("session_snapshot", (e) => {
					const data = JSON.parse(e.data);
					applySnapshot(data.peers);
				});
				es.addEventListener("session_registered", (e) => {
					const data = JSON.parse(e.data);
					applyRegistered(data.peer);
					pushFlowMaybe(data);
				});
				es.addEventListener("session_disconnected", (e) => {
					const data = JSON.parse(e.data);
					applyDisconnected(data.peerId);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_sent", (e) => {
					const data = JSON.parse(e.data);
					applyQueueDelta(data.message.to, 1);
					applyLastActivity(data.message.from, data.message.sentAt);
					applyLastActivity(data.message.to, data.message.sentAt);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_read", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("message_acked", (e) => {
					const data = JSON.parse(e.data);
					applyQueueDelta(data.peerId, -1);
					pushFlowMaybe(data);
				});
				es.addEventListener("message_redelivered", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("message_expired", (e) => {
					pushFlowMaybe(JSON.parse(e.data));
				});
				es.addEventListener("topic_created", (e) => {
					const data = JSON.parse(e.data);
					applyTopicCreated(data.topic);
					pushFlowMaybe(data);
				});
				es.addEventListener("topic_subscribed", (e) => {
					const data = JSON.parse(e.data);
					applyTopicSubscribed(data.topicId);
					pushFlowMaybe(data);
					if (
						isDetailMode() &&
						data.topicId === selectedContext.topicId &&
						topicDetail
					) {
						const exists = topicDetail.subscribers.some(
							(s) => s.peerId === data.peerId,
						);
						if (!exists) {
							topicDetail = {
								...topicDetail,
								subscribers: [
									...topicDetail.subscribers,
									{
										peerId: data.peerId,
										subscribedAt: data.at ?? new Date().toISOString(),
										queueDepth: 0,
										lastReadAt: null,
									},
								],
							};
							renderDetailHeader();
							renderDetailSubscribers();
						}
					}
				});
				es.addEventListener("topic_unsubscribed", (e) => {
					const data = JSON.parse(e.data);
					applyTopicUnsubscribed(data.topicId);
					pushFlowMaybe(data);
					if (
						isDetailMode() &&
						data.topicId === selectedContext.topicId &&
						topicDetail
					) {
						topicDetail = {
							...topicDetail,
							subscribers: topicDetail.subscribers.filter(
								(s) => s.peerId !== data.peerId,
							),
						};
						renderDetailHeader();
						renderDetailSubscribers();
					}
				});
				es.addEventListener("topic_message_published", (e) => {
					const data = JSON.parse(e.data);
					applyTopicPublished(data.topicId, data.sentAt);
					pushFlowMaybe(data);
					if (
						isDetailMode() &&
						data.topicId === selectedContext.topicId &&
						topicDetail
					) {
						const delivered = data.deliveredTo ?? [];
						topicDetail = {
							...topicDetail,
							subscribers: topicDetail.subscribers.map((s) =>
								delivered.includes(s.peerId)
									? { ...s, queueDepth: s.queueDepth + 1 }
									: s,
							),
						};
						renderDetailSubscribers();
						scheduleHistoryRefresh();
					}
				});
				es.addEventListener("heartbeat", () => {});
			}

			renderFlowHeader();
			loadInitialTopics();
			connect();
		</script>
	</body>
</html>
